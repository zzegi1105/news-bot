name: Daily News Webhook

on:
  schedule:
    # 한국 오전 8시(UTC 23시), 오후 4시(UTC 7시)
    - cron: '0 23 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          # 💡 아래 부분을 정확히 확인하세요. secrets. 뒤에는 
          # 사용자님이 GitHub Settings에서 만든 Secret 이름과 '정확히' 일치해야 합니다.
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
        run: python main.py
