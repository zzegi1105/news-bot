# auto_news.yml 예시 (올바른 설정)
name: Auto News
on:
  schedule:
    # 매일 오전 7시 KST (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Send News
      env:
        DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
      run: python main.py
