name: Auto News KST 7AM
on:
  schedule:
    - cron: '0 22 * * *'  # KST 오전 7시
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 1단계

jobs:
  send-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 2단계 (중요!)
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install requests
      run: pip install requests
      
    - name: Send News
      env:
        DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 3단계 (최종 보험)
      run: python main.py
