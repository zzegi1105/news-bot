name: Daily News Webhook

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 👈 v3에서 v4로 확실히 변경됨

      - name: Set up Python
        uses: actions/setup-python@v5 # 👈 v4에서 v5로 확실히 변경됨
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
        run: main.py
