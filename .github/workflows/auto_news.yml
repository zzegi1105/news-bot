name: Auto News KST 7AM
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4  # v5 대신 v4 (안정적)
    - uses: actions/setup-python@v4  # v5 대신 v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests lxml
    - name: Run News Bot
      env:
        DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
      run: python main.py
