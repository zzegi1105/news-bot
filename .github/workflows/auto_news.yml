name: Daily News Webhook

on:
  schedule:
    # 한국 오전 8시(UTC 23시), 오후 4시(UTC 7시)
    - cron: '0 23 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # v3에서 v4로 업데이트 (Node.js 24 지원)
        uses: actions/checkout@v4 

      - name: Set up Python
        # v4에서 v5로 업데이트 (Node.js 24 지원)
        uses: actions/setup-python@v5 
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          # 깃허브 Secrets에 등록한 이름과 똑같아야 합니다.
          DISCORD_WEBHOOK_1: ${{ DISCORDJI }}

        run: python main.py
