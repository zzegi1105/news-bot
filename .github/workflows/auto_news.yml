name: 경제 뉴스 알림 (오전 7시)

on:
  schedule:
    # KST 오전 7시 = UTC 전날 22시 (월~금)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🔍 파일 확인
        run: |
          echo "현재 위치: $(pwd)"
          echo "파일 목록:"
          ls -la *.py || echo "news.py 파일이 없습니다!"

      - name: 🐍 Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 📰 뉴스 전송
        env:
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
        run: |
          python news.py
