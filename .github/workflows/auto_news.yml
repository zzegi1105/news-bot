name: Auto News KST 7AM
on:
  schedule:
    # KST 오전 7시 = UTC 22:00 (매일)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node24 강제 사용

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5  # v4 → v5 (Node24 지원)
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5  # v4 → v5 (Node24 지원)
      with:
        python-version: '3.11'
        
    - name: Send News to Discord
      env:
        DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
      run: python main.py
