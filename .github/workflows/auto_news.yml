name: Daily News Webhook

on:
  schedule:
    - cron: '0 23 * * *'  # 한국 오전 8시
    - cron: '0 7 * * *'   # 한국 오후 4시
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Node.js 24 대응 버전

      - name: Set up Python
        uses: actions/setup-python@v5 # Node.js 24 대응 버전
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          # 여기서 ${{ secrets.이름 }} 형식이 정확해야 합니다.
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
        run: python main.py
