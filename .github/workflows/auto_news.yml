name: Daily News Webhook

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Node.js 24를 강제로 사용하도록 설정
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # 👈 v4에서 v6로 변경 (Node 24 지원)

      - name: Set up Python
        uses: actions/setup-python@v6 # 👈 v5에서 v6로 변경 (Node 24 지원)
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
        run: python main.py
