name: Daily News Webhook

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # 최신 Node.js를 지원하는 v4로 업데이트
        uses: actions/checkout@v4 

      - name: Set up Python
        # 최신 Node.js를 지원하는 v5로 업데이트
        uses: actions/setup-python@v5 
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
        run: python main.py
